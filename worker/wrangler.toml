name = "aipe-feedback"
main = "feedback-worker.js"
compatibility_date = "2026-05-01"

[vars]
# Replace with the public origin where the form lives
ALLOWED_ORIGIN = "https://ukeme-owoh.github.io"
GIST_FILENAME  = "feedback.jsonl"

# Optional: bind a KV namespace for per-IP rate limiting.
# Create with: wrangler kv:namespace create RATE_LIMIT_KV
# Then uncomment and paste the id.
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "REPLACE_WITH_KV_ID"

# Secrets are NOT set here. Use:
#   wrangler secret put GH_TOKEN
#   wrangler secret put GIST_ID
